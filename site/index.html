.icon svg {

  height: 33px;
  fill: currentColor;

svg {

.icon:hover {

.copy-discord {

.copy-discord .tooltip {

  border-radius: 12px;

  font-size: 10px;
  white-space: nowrap;

  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s ease;
}

.copy-discord:hover .tooltip {
